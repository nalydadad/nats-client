name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "16.2"
  LIBRARY_SCHEME: "NATSChatClient"
  DEMO_SCHEME: "ChatClientDemo"
  IOS_DESTINATION: "platform=iOS Simulator,name=iPhone 16,OS=latest"

jobs:
  format:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Lint with swift-format
        shell: bash
        run: |
          paths=()
          [ -d Sources ] && paths+=(Sources)
          [ -d Tests ] && paths+=(Tests)
          if [ ${#paths[@]} -eq 0 ]; then
            echo "::notice::No Swift sources to lint yet (Sources/Tests not present)."
            exit 0
          fi
          xcrun swift-format lint --strict --recursive "${paths[@]}"

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-

      - name: Resolve packages
        run: swift package resolve

      - name: Test library on macOS
        run: swift test

      - name: Build library for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "$LIBRARY_SCHEME" \
            -destination "$IOS_DESTINATION" \
            | xcbeautify --renderer github-actions

      - name: Build demo for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "$DEMO_SCHEME" \
            -destination "$IOS_DESTINATION" \
            | xcbeautify --renderer github-actions
        continue-on-error: true
