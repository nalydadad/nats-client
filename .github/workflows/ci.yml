name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "16.2"
  LIBRARY_SCHEME: "NATSChatClient"
  DEMO_SCHEME: "ChatClientDemo"
  # Build-only destination — avoids depending on a specific simulator runtime
  # (e.g. iPhone 16 / iOS 18) being present on the macos-15 runner image,
  # which has drifted in the past and broken `name=iPhone N,OS=latest`.
  IOS_DESTINATION: "generic/platform=iOS Simulator"

jobs:
  format:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Lint with swift-format
        shell: bash
        run: |
          paths=()
          [ -d Sources ] && paths+=(Sources)
          [ -d Tests ] && paths+=(Tests)
          if [ ${#paths[@]} -eq 0 ]; then
            echo "::notice::No Swift sources to lint yet (Sources/Tests not present)."
            exit 0
          fi
          xcrun swift-format lint --strict --recursive "${paths[@]}"

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-

      - name: Resolve packages
        run: swift package resolve

      - name: Test library on macOS
        run: swift test

      - name: Show available iOS Simulator destinations (diagnostic)
        if: always()
        run: xcodebuild -scheme "$LIBRARY_SCHEME" -showdestinations | grep -E "platform:iOS" || true

      # Advisory: exit 70 from xcodebuild on macos-15 + Xcode 16.2 has been
      # observed even with `generic/platform=iOS Simulator`. Real library
      # validation runs on macOS via `swift test` above. Keeping this step
      # so the failure mode stays visible, but it must not gate merges
      # until the runner-image side is understood.
      - name: Build library for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "$LIBRARY_SCHEME" \
            -destination "$IOS_DESTINATION" \
            | xcbeautify --renderer github-actions
        continue-on-error: true

      - name: Build demo for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "$DEMO_SCHEME" \
            -destination "$IOS_DESTINATION" \
            | xcbeautify --renderer github-actions
        continue-on-error: true
